<style>
  /* Self-hostable fallback stack first; Google Fonts is a progressive enhancement only. */
  @font-face { font-family: 'GFallback'; src: local('Georgia'); }

  :root {
    --paper: #FAF6EF;
    --paper-2: #F1EBDD;
    --ink: #1F2A37;
    --ink-soft: #6B6256;
    --red: #B0413E;
    --sage: #5C7A5C;
    --ocre: #C9A24B;
    --line: #E4DCC8;
    --font-serif: 'Source Serif 4', Georgia, 'Times New Roman', serif;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-script: 'Caveat', cursive;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    color: var(--ink);
    background: var(--paper);
    background-image: linear-gradient(var(--line) 1px, transparent 1px);
    background-size: 100% 32px;
    -webkit-font-smoothing: antialiased;
  }

  #root { min-height: 100vh; }

  .app-root {
    padding: calc(18px + env(safe-area-inset-top)) 16px calc(60px + env(safe-area-inset-bottom));
    max-width: 640px;
    margin: 0 auto;
    min-height: 100vh;
  }

  h1, h2, h3 { font-family: var(--font-serif); color: var(--ink); margin: 0; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; gap: 10px; }
  .header h1 { font-size: 1.45rem; letter-spacing: -0.01em; }
  .header .sub { font-size: 0.78rem; color: var(--ink-soft); margin-top: 2px; }

  .gear-btn {
    background: var(--paper-2); border: 1px solid var(--line); border-radius: 10px;
    width: 38px; height: 38px; flex-shrink: 0; cursor: pointer; font-size: 1.05rem;
    display: flex; align-items: center; justify-content: center; color: var(--ink);
  }

  .tabs { display: flex; gap: 6px; background: var(--paper-2); padding: 4px; border-radius: 12px; margin-bottom: 18px; }
  .tab-btn { flex: 1; border: none; background: transparent; padding: 9px 10px; border-radius: 9px; font-family: var(--font-sans); font-weight: 600; font-size: 0.85rem; color: var(--ink-soft); cursor: pointer; }
  .tab-btn.active { background: var(--ink); color: var(--paper); }

  .card { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 18px; box-shadow: 0 2px 10px rgba(31,42,55,0.04); margin-bottom: 16px; }

  .eyebrow { text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.08em; color: var(--ink-soft); font-weight: 600; }

  label.field-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--ink-soft); margin-bottom: 5px; }

  input[type="text"], input[type="password"], textarea, select {
    width: 100%; font-family: var(--font-sans); font-size: 0.95rem; padding: 10px 12px;
    border: 1px solid var(--line); border-radius: 10px; background: var(--paper-2); color: var(--ink);
  }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--ink); outline-offset: 1px; }
  textarea { resize: vertical; min-height: 160px; line-height: 1.5; font-family: var(--font-sans); }

  .name-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .name-row > div { flex: 1; min-width: 110px; }

  .mode-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
  .mode-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--line); background: var(--paper-2); font-weight: 600; font-size: 0.85rem; color: var(--ink-soft); cursor: pointer; }
  .mode-btn.active { border-color: var(--ink); background: var(--ink); color: var(--paper); }

  .dropzone { border: 2px dashed var(--line); border-radius: 14px; padding: 26px 16px; text-align: center; cursor: pointer; color: var(--ink-soft); background: var(--paper-2); }
  .dropzone:hover { border-color: var(--ink-soft); }

  .thumb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 12px; }
  .thumb { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--line); aspect-ratio: 3/4; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb .remove { position: absolute; top: 3px; right: 3px; background: rgba(31,42,55,0.75); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; cursor: pointer; line-height: 1; }
  .thumb .page-num { position: absolute; bottom: 3px; left: 3px; background: rgba(31,42,55,0.75); color: #fff; border-radius: 5px; font-size: 0.65rem; padding: 1px 5px; }

  .btn-primary { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--ink); color: var(--paper); font-weight: 700; font-size: 0.98rem; cursor: pointer; margin-top: 14px; font-family: var(--font-sans); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary { padding: 10px 16px; border-radius: 10px; border: 1px solid var(--ink); background: transparent; color: var(--ink); font-weight: 600; font-size: 0.85rem; cursor: pointer; font-family: var(--font-sans); }
  .btn-secondary:disabled { opacity: 0.5; cursor: default; }

  .btn-ghost { padding: 10px 16px; border-radius: 10px; border: none; background: transparent; color: var(--ink-soft); font-weight: 600; font-size: 0.85rem; cursor: pointer; text-decoration: underline; font-family: var(--font-sans); }

  .divider { height: 1px; background: var(--line); margin: 16px 0; }

  .pill { display: inline-block; padding: 4px 11px; border-radius: 999px; font-size: 0.8rem; font-weight: 700; font-family: var(--font-sans); white-space: nowrap; }

  .label-sm { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }

  .justification { font-size: 0.92rem; line-height: 1.55; color: var(--ink); margin: 8px 0 0; }
  .why-box { margin-top: 10px; display: grid; gap: 6px; }
  .why-row { display: flex; gap: 8px; font-size: 0.85rem; line-height: 1.45; padding: 8px 10px; border-radius: 9px; }
  .why-up { background: #FBF3DE; color: #7A5E18; }
  .why-down { background: #EAF1EA; color: #3D5740; }
  .why-row .why-icon { flex-shrink: 0; font-weight: 700; }

  .error-chip { background: var(--paper-2); border-radius: 10px; padding: 10px 12px; font-size: 0.9rem; }
  .uncertain-chip { background: #FBF3DE; border-radius: 10px; padding: 10px 12px; }
  .group-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .group-tab { border: 1px solid var(--line); background: var(--paper-2); color: var(--ink-soft); border-radius: 999px; padding: 5px 12px; font-size: 0.82rem; font-weight: 600; font-family: var(--font-sans); cursor: pointer; }
  .group-tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .nav-bar { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
  .nav-bar:last-of-type { margin-bottom: 0; margin-top: 12px; }
  .nav-arrow { flex: 1; padding: 10px 8px; border-radius: 10px; border: 1px solid var(--ink); background: #fff; color: var(--ink); font-weight: 600; font-size: 0.85rem; font-family: var(--font-sans); cursor: pointer; }
  .nav-arrow:disabled { opacity: 0.35; cursor: not-allowed; }
  .project-switcher { display: flex; gap: 8px; margin-bottom: 14px; }
  .project-btn { flex: 1; padding: 10px 8px; border-radius: 12px; border: 1.5px solid var(--line); background: var(--paper-2); color: var(--ink-soft); font-weight: 700; font-size: 0.9rem; font-family: var(--font-sans); cursor: pointer; }
  .project-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .error-banner { background: #FCEAE9; border: 1px solid var(--red); color: var(--red); padding: 12px; border-radius: 10px; font-size: 0.88rem; margin-top: 12px; }
  .warn-banner { background: #FBF3DE; border: 1px solid var(--ocre); color: #7A5E18; padding: 12px; border-radius: 10px; font-size: 0.88rem; margin-bottom: 14px; }
  .info-banner { background: #EAF1EA; border: 1px solid var(--sage); color: #3D5740; padding: 12px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 14px; line-height: 1.5; }

  .loading-wrap { display: flex; align-items: center; gap: 10px; color: var(--ink-soft); font-size: 0.9rem; margin-top: 14px; }
  .spinner { width: 18px; height: 18px; border: 2.5px solid var(--line); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .history-row { display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; }
  .icon-btn { background: transparent; border: none; color: var(--ink-soft); font-size: 0.9rem; cursor: pointer; padding: 4px 6px; }

  details summary { cursor: pointer; }
  details summary::-webkit-details-marker { display: none; }

  .flag-badge { display: inline-flex; align-items: center; gap: 4px; background: #FBF3DE; color: #7A5E18; border-radius: 7px; padding: 2px 8px; font-size: 0.74rem; font-weight: 700; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(31,42,55,0.55); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
  @media (min-width: 640px) { .modal-backdrop { align-items: center; } }
  .modal { background: var(--paper); width: 100%; max-width: 520px; border-radius: 18px 18px 0 0; padding: 20px; max-height: 88vh; overflow-y: auto; }
  @media (min-width: 640px) { .modal { border-radius: 18px; } }

  .install-banner { background: var(--ink); color: var(--paper); border-radius: 12px; padding: 12px 14px; font-size: 0.82rem; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .install-banner button { background: var(--ocre); color: var(--ink); border: none; border-radius: 8px; padding: 7px 12px; font-weight: 700; font-size: 0.78rem; cursor: pointer; flex-shrink: 0; }

  .level-chip { font-family: var(--font-serif); font-size: 0.78rem; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--line); color: var(--ink-soft); }
  .level-chip.active { border: none; color: #FAF6EF; font-weight: 700; }

  .stamp { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; border-width: 3px; border-style: solid; border-radius: 10px; padding: 10px 22px; transform: rotate(-7deg); font-family: var(--font-script); background: rgba(255,255,255,0.4); }
  .stamp .big { font-size: 2.6rem; line-height: 1; font-weight: 700; }
  .stamp .small { font-size: 1rem; letter-spacing: 0.04em; margin-top: 2px; }

  .checklist { list-style: none; padding: 0; margin: 10px 0 0; display: grid; gap: 8px; }
  .checklist li { display: flex; gap: 8px; font-size: 0.92rem; }
  .check-box { width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0; margin-top: 1px; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 0.7rem; }
  .check-box.on { background: var(--sage); }
  .check-box.off { border: 2px solid var(--line); }
  .check-note { font-size: 0.8rem; color: var(--ink-soft); margin-top: 1px; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }

  .hidden { display: none !important; }
  a { color: var(--ink); }
</style>
</head>
<body>
<div id="root"></div>

<script>
(function () {
  "use strict";

  // ==========================================================================
  // Progressive font enhancement (never blocks rendering)
  // ==========================================================================
  try {
    var link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap";
    link.onerror = function () { /* silently keep system font fallback */ };
    document.head.appendChild(link);
  } catch (e) { /* ignore */ }

  // ==========================================================================
  // Storage: localStorage only (single source of truth, per device/browser)
  // ==========================================================================
  var STORAGE_PREFIX = "sg_submission_";
  var KEY_STORAGE = "sg_anthropic_api_key";

  function listSubmissions(project) {
    var items = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf(STORAGE_PREFIX) === 0) {
        try {
          var entry = JSON.parse(localStorage.getItem(k));
          if (entry) {
            // Legacy entries (no project field) are Outsiders copies.
            var entryProject = entry.project || "outsiders";
            if (!project || entryProject === project) items.push(entry);
          }
        } catch (e) { /* skip corrupt entry */ }
      }
    }
    items.sort(function (a, b) { return new Date(b.date) - new Date(a.date); });
    return items;
  }
  function saveSubmission(entry) { localStorage.setItem(STORAGE_PREFIX + entry.id, JSON.stringify(entry)); }
  function deleteSubmission(id) { localStorage.removeItem(STORAGE_PREFIX + id); }
  function getApiKey() { return localStorage.getItem(KEY_STORAGE) || ""; }
  function setApiKey(key) {
    if (key) localStorage.setItem(KEY_STORAGE, key);
    else localStorage.removeItem(KEY_STORAGE);
  }

  // ==========================================================================
  // Rubric reference data
  // ==========================================================================
  var LEVELS_TEXT_FORM = [
    { code: "A+/A", score: 5 },
    { code: "B+/B", score: 4 },
    { code: "C+/C", score: 3 },
    { code: "D+/D", score: 2 },
    { code: "E", score: 0 }
  ];
  var LEVELS_ACCURACY = [
    { code: "A+", score: 15 }, { code: "A", score: 14 },
    { code: "B+", score: 13 }, { code: "B", score: 11 },
    { code: "C+", score: 10 }, { code: "C", score: 9 },
    { code: "D+", score: 8 }, { code: "D", score: 6 },
    { code: "E", score: 3 }
  ];

  // C2 rubric levels (Animals & Us, Task 3 notes). Score out of 20.
  var LEVELS_C2 = [
    { code: "A+", score: 20 }, { code: "A", score: 18 },
    { code: "B+", score: 17 }, { code: "B", score: 15 },
    { code: "C+", score: 14 }, { code: "C", score: 12 },
    { code: "D+", score: 11 }, { code: "D", score: 8 },
    { code: "E", score: 6 }
  ];

  // ==========================================================================
  // SYSTEM PROMPT
  // ==========================================================================
  var SYSTEM_PROMPT = [
'You are an experienced, fair, and highly consistent Quebec Secondary 3 ESL Core teacher. You are grading final drafts of a short opinion text written for the "The Outsiders" C3 writing task. The prompt students answered was:',
'',
'"What is the main message of The Outsiders, and is this message still important today?"',
'',
'Required task parameters given to students: 200-250 words; introduction with opinion; two reasons each with one example; a conclusion. Students could use a word bank, dictionary, sentence starters, and a planning sheet.',
'',
'IMPORTANT — LANGUAGE: Every piece of text you produce in the JSON output (justifications, comments, notes, strengths, error descriptions, why_not_higher, why_not_lower, teacher_note, etc.) MUST be written entirely in ENGLISH. Do not use any French. This feedback is meant to be shared with the student and must be in English. The only exception is verbatim quotes from the student\'s own writing inside error_examples, which you reproduce exactly as written.',
'',
'================================================================',
'SCOPE — READ CAREFULLY',
'================================================================',
'You grade ONLY "Formulation of the message" — i.e., FORM and LANGUAGE, never content quality, never whether the chosen "message" is the right one, never the strength of the argument or the relevance of the opinion. A student who picks a weak or simplistic message but writes a structurally complete, well-formed text in clear English can still score high. A student with a brilliant, nuanced argument riddled with errors and missing a conclusion scores according to the rubric below, not their insight. Do not let content quality leak into your form/language scores in either direction.',
'',
'================================================================',
'PART 1 — TEXT FORM (score: 0, 2, 3, 4, or 5)',
'================================================================',
'Required components, each judged as present/well-formed or not:',
'(a) A meaningful title — not blank, not just "Opinion Text" or "Title:" left as a placeholder; it should relate to the student\'s actual message.',
'(b) A complete and engaging introduction — presents the film/topic AND states a clear opinion/position. A one-line introduction that only states the opinion with no framing is weaker than one that does both.',
'(c) Two complete, well-organized body paragraphs, each focused around ONE clear idea (a reason) — note: if a student merges both reasons into a single paragraph with no break, that is a structural issue (one component lacking appropriate structure), not automatically two paragraphs.',
'(d) A conclusion providing appropriate closure — restates the opinion in a new way; a conclusion that simply repeats the introduction word-for-word is weaker than one that genuinely closes the text.',
'',
'Decision procedure:',
'1. Check each of the 4 components individually: present-and-well-formed, present-but-flawed, or absent.',
'2. Count how many components are fully absent, and separately note any present-but-flawed components.',
'3. Apply:',
'   - 5 (A+/A): all 4 present AND well-formed, AND together they make the text flow well (transitions between parts feel natural, not just mechanically present).',
'   - 4 (B+/B): all 4 present and appropriate, organizing the text correctly, but fluidity/polish is more ordinary than exceptional.',
'   - 3 (C+/C): exactly ONE component is either absent OR present-but-poorly-structured.',
'   - 2 (D+/D): MORE THAN ONE component is absent or poorly structured (e.g., two missing, or one missing + one badly structured).',
'   - 0 (E): the components present are so broken/unsuitable that the text is confusing, OR the submission isn\'t actually an opinion text (e.g., it\'s a plot summary with no opinion structure, a list, or unrelated content), OR there is no visible paragraph/section structure at all.',
'4. Choose the "+" sub-level (A+ vs A, B+ vs B, etc.) based on whether execution is closer to the level above or below in spirit — A+ and B+ mean cleanly, confidently at that level; A and B mean solidly but not exceptionally at that level. The numeric score for A+/A is the same (5) and B+/B is the same (4) per the official grid, so the sub-level label is for feedback nuance only and does not change the point value.',
'',
'================================================================',
'PART 2 — ACCURACY & CLARITY (score: 0-5, 6, 8, 9, 10, 11, 13, 14, or 15)',
'================================================================',
'Covers: vocabulary accuracy, mechanics (capitalization, punctuation, spelling), grammatical structures, and overall clarity of the message.',
'',
'Calibration anchors (use these as a mental ladder, not a checklist):',
'- A reader who never has to pause = top tier.',
'- A reader who has to slow down sometimes, but never stops or rereads = still does NOT impede understanding (readability only) → A+/A/B+/B band depending on frequency.',
'- A reader who has to stop and reread a sentence to get the meaning = understanding IS impeded → C-band or below.',
'- A reader who has to guess/interpret across MULTIPLE passages to follow the text at all = D-band.',
'- A reader who, even after multiple rereads, still cannot reconstruct large portions of meaning = E.',
'',
'Decision procedure:',
'1. Read the whole text once for global comprehension. Note your own reading experience: did you ever have to stop and re-read a sentence to understand it (not just to admire it — actually to parse meaning)?',
'2. Count roughly how often this happened: never/almost never, occasionally (a few isolated spots), repeatedly (many spots, but you could still piece together the overall meaning), or so often that large parts remain unclear even after rereading.',
'3. Separately ask: does the frequency and severity affect READABILITY only (minor slow-down, you don\'t lose the thread) or does it affect UNDERSTANDING (you actually lose or have to reconstruct meaning)?',
'4. Map:',
'   - 14-15 (A/A+): errors present, but you never lost understanding; at most minor readability friction. A+ = nearly error-free or only trivial slips; A = a normal, comfortable amount of error for this proficiency level.',
'   - 11-13 (B/B+): readability is somewhat affected (you notice the errors, sentence flow is sometimes clunky) but you are never confused about meaning. B+ = closer to flawless readability with occasional bumps; B = readability bumps are more frequent but still never block understanding.',
'   - 9-10 (C/C+): errors or awkward structures SOMETIMES force you to re-read or interpret to get the meaning, but you ultimately do understand the whole text. C+ = this happens only occasionally; C = it happens somewhat more often.',
'   - 6-8 (D/D+): errors or awkward structures REPEATEDLY force significant interpretation; you understand the text overall but only by actively reconstructing meaning throughout. D+ = still mostly followable with effort; D = effort is substantial and sustained.',
'   - 0-5 (E): even after rereading, large parts of the text cannot be reliably understood, OR the text is substantially copied verbatim from a source (the film\'s dialogue, a plot summary text, or another external text) rather than being the student\'s own writing — if you suspect copying, say so in integrity_flag rather than guessing; do not assign E for suspected-but-unconfirmed copying alone.',
'5. Remember these are Secondary 3 ESL Core (non-native, "regular group," not enriched) students. A normal, expected amount of grammatical imperfection (article errors, occasional subject-verb agreement slips, simple-but-correct sentence structures, direct word-for-word translations from French that are still comprehensible) belongs in the A-band if it does not block understanding. Reserve C/D/E bands for errors that genuinely create comprehension friction, not merely for "not native-like."',
'',
'GENERAL GRADING STANCE — slightly lenient: when a copy sits genuinely between two levels and you could reasonably justify either, choose the HIGHER one. Give the student the benefit of the doubt on borderline calls. This is end-of-year work from regular-stream 14-15 year-old ESL learners who wrote by hand in a single class period, so reward clear effort and communication over polish. Do not invent merit that is not there, do not ignore real, repeated errors, and never push a clearly-deficient text up a whole band — but on close calls, lean kind rather than harsh. Apply this same mild generosity to BOTH criteria (Text form and Accuracy).',
'',
'================================================================',
'STEP-BY-STEP METHOD (do this internally before producing the JSON)',
'================================================================',
'1. TRANSCRIBE the full text faithfully from the image(s) (in page order). This handwriting is from 14-15 year-old ESL students, so expect informal letter shapes, inconsistent spacing, crossed-out words, words squeezed in margins, and spelling errors — these are normal. Read patiently and use sentence context to resolve ambiguous letters. ALWAYS make your best guess rather than giving up: never leave the text blank. CRITICAL DISTINCTION for grading fairness: (a) if a word is hard to read because of the PHOTO or messy handwriting, transcribe your best guess wrapped in <<double angle brackets>>, add it to the uncertain_words list, and do NOT treat your own reading-uncertainty as a spelling mistake; (b) if a word is clearly legible but the STUDENT spelled it wrong, transcribe it exactly as the student wrote it (misspelled), and DO count it as a spelling error in the accuracy criterion. In short: photo/handwriting illegibility is never the student\'s fault, but a clearly-written misspelling always is. Only use [illegible] when you cannot even form a reasonable guess. Preserve the student\'s original spelling and grammar everywhere else exactly as written.',
'2. COUNT words by counting the transcription (standard word count: whitespace-separated tokens, excluding the title). Report your actual count, not the student\'s own stated count if one is visible — if the two differ notably, mention it in teacher_note.',

      "Mots à vérifier",
      "Signalement intégrité",
      "Commentaire élève"
    ];

    function rowFor(h) {
      var uncertain = (h.result.uncertain_words && h.result.uncertain_words.length > 0)
        ? h.result.uncertain_words.map(function (u) { return u.guess; }).join(" / ")
        : "";
      var pct = h.result.total_out_of ? Math.round((h.result.total_score / h.result.total_out_of) * 100) : "";
      var integrity = h.result.integrity_flag && h.result.integrity_flag.flagged ? ("Oui — " + h.result.integrity_flag.reason) : "";
      if (isAnimals) {
        var c2 = h.result.c2 || {};
        return [
          h.groupName || "(sans groupe)",
          h.studentName || "",
          new Date(h.date).toLocaleDateString("fr-CA"),
          c2.level || "",
          h.result.total_score,
          pct !== "" ? pct + "%" : "",
          (typeof h.result.pairs_found === "number") ? h.result.pairs_found : "",
          uncertain,
          integrity,
          h.result.overall_comment || ""
        ];
      }
      var wc = (h.result.word_count !== undefined ? h.result.word_count : h.result.word_count_estimate) || "";
      return [
        h.groupName || "(sans groupe)",
        h.studentName || "",
        new Date(h.date).toLocaleDateString("fr-CA"),
        h.result.text_form.score,
        h.result.text_form.level,
        h.result.accuracy.score,
        h.result.accuracy.level,
        h.result.total_score,
        pct !== "" ? pct + "%" : "",
        wc,
        uncertain,
        integrity,
        h.result.overall_comment || ""
      ];
    }

    // Build rows with a group header line + per-group average line.
    var allRows = [headers];
    var currentGroup = null;
    var groupScores = [];
    var colCount = headers.length;

    function flushGroupAverage() {
      if (currentGroup !== null && groupScores.length > 0) {
        var sum = groupScores.reduce(function (a, b) { return a + b; }, 0);
        var avg = (sum / groupScores.length).toFixed(1);
        var avgRow = new Array(colCount).fill("");
        avgRow[1] = "Moyenne du groupe " + currentGroup;
        // total column index differs per project
        var totalIdx = isAnimals ? 4 : 7;
        var pctIdx = isAnimals ? 5 : 8;
        avgRow[totalIdx] = avg + " / 20";
        avgRow[pctIdx] = Math.round((avg / 20) * 100) + "%";
        allRows.push(avgRow);
        allRows.push([]); // blank separator line
      }
    }

    sorted.forEach(function (h) {
      var g = h.groupName || "(sans groupe)";
      if (g !== currentGroup) {
        flushGroupAverage();
        currentGroup = g;
        groupScores = [];
        allRows.push(["── Groupe : " + g + " ──"]);
      }
      allRows.push(rowFor(h));
      groupScores.push(h.result.total_score);
    });
    flushGroupAverage();

    var csv = allRows.map(function (r) { return r.map(csvEscape).join(","); }).join("\n");
    var blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = (isAnimals ? "animals_and_us_notes_" : "the_outsiders_notes_") + new Date().toISOString().slice(0, 10) + ".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  function downloadJSON(history) {
    var payload = {
      exported_from: "Stay Gold, Marker",
      exported_at: new Date().toISOString(),
      count: history.length,
      submissions: history
    };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "stay_gold_historique_" + new Date().toISOString().slice(0, 10) + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  function importJSONFile(file) {
    return file.text().then(function (text) {
      var data = JSON.parse(text);
      var submissions = Array.isArray(data) ? data : (data.submissions || []);
      if (!Array.isArray(submissions)) throw new Error("Format de fichier non reconnu.");

      var existingIds = {};
      listSubmissions().forEach(function (s) { existingIds[s.id] = true; });

      var added = 0, skipped = 0, invalid = 0;
      submissions.forEach(function (entry) {
        if (!entry || !entry.id || !entry.result || !entry.date) { invalid++; return; }
        if (existingIds[entry.id]) { skipped++; return; }
        saveSubmission(entry);
        existingIds[entry.id] = true;
        added++;
      });

      return { added: added, skipped: skipped, invalid: invalid };
    });
  }

  // Returns the history entries currently visible (respecting the group filter),

      var g = (it.groupName || "").trim() || "(sans groupe)";
      return g === state.historyFilter;

  // Navigate to the previous/next copy relative to the one on screen.
  function navigateHistory(direction) {
    var list = getVisibleHistoryOrdered();
    if (list.length === 0) return;
    var idx = -1;
    for (var i = 0; i < list.length; i++) {
      if (list[i].id === state.currentEntryId) { idx = i; break; }
    }
    if (idx === -1) return;
    var newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= list.length) return;
    selectHistory(list[newIdx]);
  }

  }

    return el("div", { class: "card" }, children);

  function handleFiles(fileList, targetArray) {
    state.error = null;
    state.imageWarning = null;
    var target = targetArray || state.imageFiles;
    var files = Array.prototype.slice.call(fileList, 0, 6);
    if (files.length === 0) return;

    var validFiles = files.filter(function (f) { return f.type && f.type.indexOf("image/") === 0; });
    if (validFiles.length === 0) {
      state.error = "Le fichier choisi n'est pas reconnu comme une image. Réessaie avec une photo JPG ou PNG.";
      render();
      return;
    }

    var promises = validFiles.map(function (f) {
      return compressImageFile(f)
        .then(function (out) {
          // out = { blob, quality }
          return { blobOrFile: out.blob, quality: out.quality };
        })
        .catch(function (compressErr) {
          console.warn("Compression échouée, utilisation de l'image originale:", compressErr);
          return { blobOrFile: f, quality: null };
        })
        .then(function (wrap) {
          var blobOrFile = wrap.blobOrFile;
          var mediaType = blobOrFile.type || f.type || "image/jpeg";
          return fileToBase64(blobOrFile).then(function (base64) {
            var previewUrl;
            try {
              previewUrl = URL.createObjectURL(blobOrFile);
            } catch (e) {
              previewUrl = "data:" + mediaType + ";base64," + base64;
            }
            return { ok: true, base64: base64, mediaType: mediaType, previewUrl: previewUrl, name: f.name, quality: wrap.quality };
          });
        })
        .catch(function (err) {
          console.error("Échec du traitement d'une image:", err);
          return { ok: false, name: f.name, error: err };
        });
    });

    Promise.all(promises).then(function (results) {
      var added = 0, failed = 0, darkCount = 0;
      results.forEach(function (r) {
        if (r && r.ok) {
          target.push(r);
          added++;
          if (r.quality && r.quality.warn) darkCount++;
        } else { failed++; }
      });
      if (failed > 0 && added === 0) {
        state.error = "Impossible de charger la photo. Essaie de reprendre la photo, ou choisis-la depuis ta galerie plutôt que l'appareil photo.";
      } else if (failed > 0) {
        state.error = failed + " photo(s) n'ont pas pu être chargée(s), les autres ont été ajoutées.";
      } else if (darkCount > 0) {
        state.imageWarning = "⚠ " + (darkCount > 1 ? darkCount + " photos semblent" : "Une photo semble") + " très sombre. L'app a éclairci l'image automatiquement, mais pour un meilleur résultat, reprends-la avec plus de lumière, bien à plat, sans ombre.";
      }
      render();
    });
  }

  // Attempts to extract a JSON object from a possibly-messy or truncated string.
  function extractJSON(text) {
    if (!text) return null;
    var s = text.trim();
    // Strip markdown fences if present
    s = s.replace(/^```json/i, "").replace(/^```/, "").replace(/```$/, "").trim();
    // If it doesn't start with {, find the first {
    var firstBrace = s.indexOf("{");
    if (firstBrace > 0) s = s.slice(firstBrace);
    // Try direct parse first
    try { return JSON.parse(s); } catch (e) { /* continue */ }
    // Try to repair a truncated object by trimming to the last complete '}' and balancing
    var lastBrace = s.lastIndexOf("}");
    if (lastBrace !== -1) {
      var candidate = s.slice(0, lastBrace + 1);
      try { return JSON.parse(candidate); } catch (e2) { /* continue */ }
    }
    // Last resort: balance unclosed braces/brackets by appending closers
    var open = 0, openSq = 0, inStr = false, esc = false;
    for (var i = 0; i < s.length; i++) {
      var ch = s[i];
      if (esc) { esc = false; continue; }
      if (ch === "\\") { esc = true; continue; }
      if (ch === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (ch === "{") open++;
      else if (ch === "}") open--;
      else if (ch === "[") openSq++;
      else if (ch === "]") openSq--;
    }
    var repaired = s;
    if (inStr) repaired += '"';
    while (openSq-- > 0) repaired += "]";
    while (open-- > 0) repaired += "}";
    try { return JSON.parse(repaired); } catch (e3) { return null; }
  }

  function callApiOnce(userContent, systemPrompt) {
    return fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": state.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 4000,
        system: systemPrompt || SYSTEM_PROMPT,
        messages: [
          { role: "user", content: userContent }
        ]
      })
    }).then(function (response) {
      if (!response.ok) {
        return response.text().then(function (body) {
          var detail = "";
          try {
            var parsedErr = JSON.parse(body);
            if (parsedErr && parsedErr.error && parsedErr.error.message) detail = parsedErr.error.message;
          } catch (e) { detail = body.slice(0, 200); }

          if (response.status === 401) {
            throw new Error("Clé API refusée (401). Vérifie qu'elle est copiée en entier dans ⚙️, sans espace ni caractère manquant. " + detail);
          }
          if (response.status === 400 && detail.toLowerCase().indexOf("credit") !== -1) {
            throw new Error("Crédit insuffisant. Ajoute du crédit dans Billing sur console.anthropic.com. " + detail);
          }
          if (response.status === 400 && detail.toLowerCase().indexOf("model") !== -1) {
            throw new Error("Modèle non disponible pour ta clé. " + detail);
          }
          if (response.status === 429) {
            throw new Error("Limite de requêtes atteinte (429). Attends une minute et réessaie. " + detail);
          }
          throw new Error("Erreur API " + response.status + ". " + (detail || "Aucun détail fourni."));
        });
      }
      return response.json();
    }).then(function (data) {
      var textBlock = (data.content || []).find(function (b) { return b.type === "text"; });
      if (!textBlock) throw new Error("Réponse vide du modèle.");
      var parsed = extractJSON(textBlock.text);
      if (!parsed) {
        var e = new Error("PARSE_FAILED");
        e.parseFailed = true;
        throw e;
      }
      return parsed;
    });
  }

  // Core grading call with one automatic retry on parse failure.
  function gradeContent(userContent, systemPrompt) {
    return callApiOnce(userContent, systemPrompt).catch(function (e) {
      if (e && e.parseFailed) {
        // Retry once — transient truncation or formatting glitch
        return callApiOnce(userContent, systemPrompt).catch(function (e2) {
          if (e2 && e2.parseFailed) {
            throw new Error("La réponse de l'IA n'a pas pu être lue, même après une 2e tentative. La photo est peut-être trop sombre, floue ou difficile à déchiffrer — reprends-la avec plus de lumière et bien à plat.");
          }
          throw e2;
        });
      }
      throw e;
    });
  }

  function currentSystemPrompt() {
    return state.project === "animals" ? ANIMALS_SYSTEM_PROMPT : SYSTEM_PROMPT;
  }
  function currentRecheckPrompt() {
    return state.project === "animals" ? ANIMALS_RECHECK_PROMPT : RECHECK_PROMPT;
  }

  function friendlyError(e) {
    var msg = (e && e.message) ? e.message : "";
    if (msg.indexOf("Failed to fetch") !== -1 || msg.indexOf("NetworkError") !== -1 || msg.indexOf("Load failed") !== -1) {
      return "Impossible de joindre l'API. Vérifie ta connexion. Si tu es sur un wifi d'école/restreint, il peut bloquer l'accès — essaie en données mobiles.";
    }
    return msg || "Une erreur inattendue est survenue. Réessaie.";
  }

  function buildPhotoContent(imageFiles) {
    var content = [];
    imageFiles.forEach(function (img) {
      content.push({ type: "image", source: { type: "base64", media_type: img.mediaType, data: img.base64 } });
    });
    var instruction = state.project === "animals"
      ? "Here are photo(s) of one student's handwritten TASK 3 notes chart (Human Action / Impact on Animals), possibly across multiple pages, in order. Transcribe the pairs and grade with the C2 rubric according to the system instructions."
      : "Here are photo(s) of one student's handwritten final draft (possibly across multiple pages, in order). Transcribe and grade according to the system instructions.";
    content.push({ type: "text", text: instruction });
    return content;
  }

  // Re-grade (text only, no image) after the teacher confirms uncertain words.
  // corrections = [{ guess, actual }]. Returns a Promise of the updated result object.
  function recheckWords(previousResult, corrections) {
    var lines = [];
    lines.push("PREVIOUS TRANSCRIPTION:");
    lines.push(previousResult.transcription || "");
    lines.push("");
    lines.push("TEACHER CORRECTIONS (the real word the student wrote for each uncertain spot):");
    corrections.forEach(function (c) {
      lines.push('- You guessed "' + c.guess + '" → the student actually wrote: "' + c.actual + '"');
    });
    lines.push("");
    lines.push("PREVIOUS FULL EVALUATION JSON:");
    lines.push(JSON.stringify(previousResult));

    var userContent = [{ type: "text", text: lines.join("\n") }];

    return callApiOnce(userContent, currentRecheckPrompt()).catch(function (e) {
      if (e && e.parseFailed) {
        return callApiOnce(userContent, currentRecheckPrompt()).catch(function (e2) {
          if (e2 && e2.parseFailed) {
            throw new Error("La mise à jour n'a pas pu être lue. Réessaie.");
          }
          throw e2;
        });
      }
      throw e;
    });
  }

  function handleGrade() {
    state.error = null;
    state.result = null;
    state.saved = false;
    state.currentEntryId = null;

    if (!state.apiKey) {
      state.error = "Ajoute ta clé API Anthropic (icône ⚙️ en haut) avant de corriger.";
      state.keyModalOpen = true;
      render();
      return;
    }

    var userContent;
    if (state.mode === "photo") {
      if (state.imageFiles.length === 0) {
        state.error = "Ajoute au moins une photo de la copie avant de corriger.";
        render();
        return;
      }
      userContent = buildPhotoContent(state.imageFiles);
    } else {
      if (!state.typedText.trim()) {
        state.error = "Colle le texte de l'élève avant de corriger.";
        render();
        return;
      }
      var typedInstruction = state.project === "animals"
        ? "Here is the student's typed TASK 3 notes chart (Human Action / Impact on Animals pairs). Grade with the C2 rubric according to the system instructions.\n\n---\n" + state.typedText.trim() + "\n---"
        : "Here is the student's typed final draft. Grade according to the system instructions.\n\n---\n" + state.typedText.trim() + "\n---";
      userContent = [{ type: "text", text: typedInstruction }];
    }

    state.loading = true;
    render();

    gradeContent(userContent, currentSystemPrompt())
      .then(function (parsed) { state.result = parsed; })
      .catch(function (e) { console.error(e); state.error = friendlyError(e); })
      .finally(function () { state.loading = false; render(); });
  }

  function handleRecheck(previousResult) {
    state.error = null;
    // Collect only the words the teacher actually filled in.
    var corrections = [];
    (previousResult.uncertain_words || []).forEach(function (u) {
      var typed = (state.wordCorrections[u.guess] || "").trim();
      if (typed) corrections.push({ guess: u.guess, actual: typed });
    });

    if (corrections.length === 0) {
      state.error = "Écris au moins un mot avant de recalculer, ou laisse tel quel si les suppositions sont correctes.";
      render();
      return;
    }

    state.rechecking = true;
    render();

    recheckWords(previousResult, corrections)
      .then(function (updated) {
        state.result = updated;
        state.wordCorrections = {};
        state.saved = false; // allow re-saving the corrected version
      })
      .catch(function (e) { console.error(e); state.error = friendlyError(e); })
      .finally(function () { state.rechecking = false; render(); });
  }

  // ==========================================================================
  // Batch mode
  // ==========================================================================
  function addCopyToBatch() {
    state.error = null;
    if (state.batchImageFiles.length === 0) {
      state.error = "Ajoute au moins une photo pour cette copie avant de l'ajouter au lot.";
      render();
      return;
    }
    var id = Date.now() + "_" + Math.random().toString(36).slice(2, 8);
    state.batchQueue.push({
      id: id,
      studentName: state.batchStudentName.trim(),
      groupName: state.batchGroupName.trim(),
      imageFiles: state.batchImageFiles.slice()
    });
    // reset staging for next copy
    state.batchImageFiles = [];
    state.batchStudentName = "";
    state.batchGroupName = "";
    render();
  }

  function removeCopyFromBatch(id) {
    state.batchQueue = state.batchQueue.filter(function (c) { return c.id !== id; });
    render();
  }

  function runBatch() {
    state.error = null;
    if (!state.apiKey) {
      state.error = "Ajoute ta clé API Anthropic (icône ⚙️ en haut) avant de corriger.";
      state.keyModalOpen = true;
      render();
      return;
    }
    if (state.batchQueue.length === 0) {
      state.error = "Ajoute au moins une copie au lot.";
      render();
      return;
    }

    state.batchRunning = true;
    state.batchResults = [];
    state.batchProgress = { done: 0, total: state.batchQueue.length, currentName: "" };
    render();

    var queue = state.batchQueue.slice();

    function processNext(index) {
      if (index >= queue.length) {
        state.batchRunning = false;
        state.history = listSubmissions(state.project);
        render();
        return;
      }
      var copy = queue[index];
      state.batchProgress.currentName = copy.studentName || ("Copie " + (index + 1));
      render();

      gradeContent(buildPhotoContent(copy.imageFiles), currentSystemPrompt())
        .then(function (result) {
          // auto-save to history
          var entry = {
            id: copy.id,
            project: state.project,
            studentName: copy.studentName,
            groupName: copy.groupName,
            date: new Date().toISOString(),
            result: result
          };
          saveSubmission(entry);
          state.batchResults.push({
            studentName: copy.studentName || ("Copie " + (index + 1)),
            groupName: copy.groupName,
            ok: true,
            score: result.total_score,
            total: result.total_out_of
          });
        })
        .catch(function (e) {
          console.error(e);
          state.batchResults.push({
            studentName: copy.studentName || ("Copie " + (index + 1)),
            groupName: copy.groupName,
            ok: false,
            error: friendlyError(e)
          });
        })
        .finally(function () {
          state.batchProgress.done = index + 1;
          render();
          // small delay between calls to be gentle on rate limits
          setTimeout(function () { processNext(index + 1); }, 600);
        });
    }

    processNext(0);
  }

  function resetBatch() {
    state.batchQueue = [];
    state.batchResults = [];
    state.batchRunning = false;
    state.batchProgress = { done: 0, total: 0, currentName: "" };
    state.batchImageFiles = [];
    state.batchStudentName = "";
    state.batchGroupName = "";
    state.error = null;
    render();
  }

  function renderResultView() {
    var r = state.result;

    // Build the project-specific body (header + criterion sections + comment).
    var bodySections = (state.project === "animals")
      ? buildAnimalsBody(r)
      : buildOutsidersBody(r);

    // ---- Shared: uncertain words section ----
    var uncertainSection = buildUncertainSection(r);

    // ---- Shared: transcription ----
    var transcriptionLabel = (state.project === "animals")
      ? "Voir la transcription du tableau"
      : "Voir la transcription complète";
    var transcriptionDetails = el("details", { style: { marginTop: "14px" } }, [
      el("summary", { style: { color: "var(--ink-soft)", fontSize: "0.85rem" } }, [transcriptionLabel]),
      el("p", { style: { fontSize: "0.78rem", color: "var(--ink-soft)", margin: "6px 0 0" } }, ["Les mots entre <<…>> sont des suppositions de l'IA."]),
      el("p", { style: { whiteSpace: "pre-wrap", fontFamily: "var(--font-serif)", fontSize: "0.92rem", marginTop: "8px", lineHeight: "1.6" } }, [r.transcription])
    ]);

    // ---- Shared: save button ----
    var saveBtn = el("button", {
      class: "btn-secondary",
      disabled: state.saved,
      onclick: function () {
        if (state.saved) return;
        var id = state.currentEntryId || (Date.now() + "_" + Math.random().toString(36).slice(2, 8));
        var entry = { id: id, project: state.project, studentName: state.studentName.trim(), groupName: state.groupName.trim(), date: new Date().toISOString(), result: r };
        saveSubmission(entry);
        state.currentEntryId = id;
        state.history = listSubmissions(state.project);
        state.saved = true;
        render();
      }
    }, [state.saved ? "✓ Enregistré dans l'historique" : (state.currentEntryId ? "Mettre à jour dans l'historique" : "Enregistrer dans l'historique")]);

    var cardChildren = bodySections.concat([uncertainSection, transcriptionDetails,
      el("div", { style: { marginTop: "16px", display: "flex", gap: "10px" } }, [saveBtn])]);
    var resultCard = el("div", { class: "card result-card" }, cardChildren);

    // Navigation arrows — only when the displayed copy belongs to the history list.
    function buildNavBar() {
      if (!state.currentEntryId) return null;
      var visible = getVisibleHistoryOrdered();
      var pos = -1;
      for (var vi = 0; vi < visible.length; vi++) {
        if (visible[vi].id === state.currentEntryId) { pos = vi; break; }
      }
      if (pos === -1 || visible.length <= 1) return null;
      var prevBtn = el("button", {
        class: "nav-arrow", disabled: !(pos > 0),
        onclick: function () { navigateHistory(-1); }
      }, ["← Précédente"]);
      var nextBtn = el("button", {
        class: "nav-arrow", disabled: !(pos < visible.length - 1),
        onclick: function () { navigateHistory(1); }
      }, ["Suivante →"]);
      var counter = el("span", { style: { fontSize: "0.82rem", color: "var(--ink-soft)", fontWeight: "600" } }, [
        (pos + 1) + " / " + visible.length
      ]);
      return el("div", { class: "nav-bar" }, [prevBtn, counter, nextBtn]);
    }

    var newCopyBtn = el("button", {
      class: "btn-ghost",
      onclick: function () {
        state.result = null; state.saved = false; state.imageFiles = []; state.typedText = "";
        state.studentName = ""; state.groupName = ""; state.error = null;
        state.wordCorrections = {}; state.imageWarning = null; state.currentEntryId = null;
        render();
      }
    }, ["← Corriger une nouvelle copie"]);

    var children = [];
    var topNav = buildNavBar();
    if (topNav) children.push(topNav);
    children.push(resultCard);
    var bottomNav = buildNavBar();
    if (bottomNav) children.push(bottomNav);
    children.push(newCopyBtn);

    return el("div", {}, children);
  }

  // Shared uncertain-words section (both projects).
  function buildUncertainSection(r) {
    if (!r.uncertain_words || r.uncertain_words.length === 0) return null;
    var wordRows = r.uncertain_words.map(function (u) {
      var inputEl = el("input", {
        type: "text",
        placeholder: "Mot exact écrit par l'élève",
        value: state.wordCorrections[u.guess] || "",
        style: { marginTop: "8px" },
        oninput: function (e) { state.wordCorrections[u.guess] = e.target.value; }
      });
      inputEl.value = state.wordCorrections[u.guess] || "";
      return el("div", { class: "uncertain-chip" }, [
        el("div", {}, [
          el("span", { style: { fontWeight: "700", fontFamily: "var(--font-serif)" } }, ["« " + u.guess + " »"]),
          u.reason ? el("span", { style: { fontSize: "0.78rem", color: "var(--ink-soft)" } }, ["  — " + u.reason]) : null
        ]),
        u.context ? el("div", { style: { fontSize: "0.82rem", color: "var(--ink-soft)", marginTop: "2px", fontStyle: "italic" } }, ["…" + u.context + "…"]) : null,
        inputEl
      ]);
    });

    var recheckBtn;
    if (state.rechecking) {
      recheckBtn = el("div", { class: "loading-wrap" }, [el("div", { class: "spinner" }), "Mise à jour de la correction…"]);
    } else {
      recheckBtn = el("button", {
        class: "btn-primary", style: { marginTop: "12px" },
        onclick: function () { handleRecheck(r); }
      }, ["Recalculer avec mes corrections"]);
    }

    return el("div", { style: { marginTop: "14px" } }, [
      el("span", { class: "label-sm", style: { color: "var(--ocre)" } }, ["Mots à vérifier (" + r.uncertain_words.length + ")"]),
      el("p", { style: { fontSize: "0.82rem", color: "var(--ink-soft)", margin: "4px 0 8px" } }, [
        "L'IA a deviné ces mots. Lis-les sur la copie et écris ce que l'élève a vraiment écrit (avec ses fautes), puis recalcule. Laisse vide si le mot deviné est correct."
      ]),
      el("div", { style: { display: "grid", gap: "8px" } }, wordRows),
      recheckBtn
    ]);
  }

  // ---- The Outsiders (C3) body ----
  function buildOutsidersBody(r) {
    var wordCount = (r.word_count !== undefined ? r.word_count : r.word_count_estimate);
    var wcNum = (typeof wordCount === "number") ? wordCount : parseInt(wordCount, 10);
    var wcOutOfRange = (!isNaN(wcNum)) && (wcNum < 150 || wcNum > 300);

    var headerLeft = el("div", {}, [
      el("div", { class: "eyebrow" }, ["Résultat"]),
      el("h2", { style: { margin: "2px 0 4px" } }, [state.studentName || "Élève sans nom"]),
      state.groupName ? el("p", { style: { margin: "0", fontSize: "0.82rem", color: "var(--ink-soft)" } }, ["Groupe " + state.groupName]) : null,
      r.title_found ? el("p", { style: { margin: "4px 0 0", color: "var(--ink-soft)", fontStyle: "italic" } }, ["« " + r.title_found + " »"]) : null,
      el("p", { style: { margin: "4px 0 0", fontSize: "0.85rem", color: "var(--ink-soft)" } }, [
        wordCount + " mots",
        wcOutOfRange ? el("span", { style: { color: "var(--ocre)", fontWeight: "700" } }, [" ⚠ hors de 150–300"]) : null
      ]),
      (r.integrity_flag && r.integrity_flag.flagged) ? el("div", { class: "flag-badge", style: { marginTop: "6px" } }, ["⚑ À vérifier : " + r.integrity_flag.reason]) : null
    ]);

    var color = scoreColor(r.total_score, r.total_out_of);
    var stamp = el("div", { class: "stamp", style: { borderColor: color, color: color } }, [
      el("span", { class: "big" }, [r.total_score + "/" + r.total_out_of]),
      el("span", { class: "small" }, ["Formulation"])
    ]);

    var headerSection = el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: "16px" } }, [headerLeft, stamp]);

    var commentSection = el("section", {}, [
      el("h3", { style: { margin: "0 0 6px" } }, ["Commentaire pour l'élève"]),
      el("p", { class: "justification", style: { background: "var(--paper-2)", padding: "12px", borderRadius: "10px" } }, [r.overall_comment])
    ]);

    var teacherNote = r.teacher_note ? el("section", { style: { marginTop: "10px" } }, [
      el("span", { class: "label-sm", style: { color: "var(--ink-soft)" } }, ["Note pour l'enseignant·e"]),
      el("p", { style: { fontSize: "0.88rem", color: "var(--ink-soft)", margin: "4px 0 0" } }, [r.teacher_note])
    ]) : null;

    return [
      headerSection, el("div", { class: "divider" }),
      renderTextFormSection(r.text_form), el("div", { class: "divider" }),
      renderAccuracySection(r.accuracy), el("div", { class: "divider" }),
      commentSection, teacherNote
    ];
  }

  // ---- Animals & Us (C2) body ----
  function buildAnimalsBody(r) {
    var c2 = r.c2 || {};
    var headerLeft = el("div", {}, [
      el("div", { class: "eyebrow" }, ["Résultat"]),
      el("h2", { style: { margin: "2px 0 4px" } }, [state.studentName || "Élève sans nom"]),
      state.groupName ? el("p", { style: { margin: "0", fontSize: "0.82rem", color: "var(--ink-soft)" } }, ["Groupe " + state.groupName]) : null,
      (typeof r.pairs_found === "number") ? el("p", { style: { margin: "4px 0 0", fontSize: "0.85rem", color: "var(--ink-soft)" } }, [r.pairs_found + " paire(s) action/impact"]) : null,
      r.coverage_note ? el("p", { style: { margin: "4px 0 0", fontSize: "0.82rem", color: "var(--ink-soft)", fontStyle: "italic" } }, [r.coverage_note]) : null,
      (r.integrity_flag && r.integrity_flag.flagged) ? el("div", { class: "flag-badge", style: { marginTop: "6px" } }, ["⚑ À vérifier : " + r.integrity_flag.reason]) : null
    ]);

    var color = scoreColor(r.total_score, r.total_out_of);
    var stamp = el("div", { class: "stamp", style: { borderColor: color, color: color } }, [
      el("span", { class: "big" }, [r.total_score + "/" + r.total_out_of]),
      el("span", { class: "small" }, ["C2"])
    ]);

    var headerSection = el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: "16px" } }, [headerLeft, stamp]);

    // C2 criterion section
    var levelChip = el("span", { class: "pill", style: { background: scoreColor(c2.score, 20), color: "#FAF6EF" } }, [c2.level + " — " + c2.score + "/20"]);
    var c2Header = el("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between" } }, [
      el("h3", {}, ["Réinvestissement du contenu (C2)"]),
      levelChip
    ]);
    var c2Section = el("section", {}, [
      c2Header,
      el("p", { class: "justification" }, [c2.justification]),
      renderWhyBox(c2),
      renderLevelRow(LEVELS_C2, c2.level, 20)
    ]);

    // Accurate points
    var accurateSection = null;
    if (r.accurate_points && r.accurate_points.length > 0) {
      accurateSection = el("section", { style: { marginTop: "4px" } }, [
        el("span", { class: "label-sm", style: { color: "var(--sage)" } }, ["Bien réinvesti"]),
        el("ul", { class: "checklist", style: { marginTop: "6px" } }, r.accurate_points.map(function (p) {
          return el("li", {}, [el("span", { class: "check-box on" }, ["✓"]), el("span", {}, [p])]);
        }))
      ]);
    }

    // Issues
    var issuesSection = null;
    if (r.issues && r.issues.length > 0) {
      var issueLabels = {
        inaccuracy: "Inexactitude", mismatch: "Mauvais appariement",
        not_pertinent: "Non pertinent", too_general: "Trop général", verbatim_copy: "Copié mot à mot"
      };
      issuesSection = el("section", { style: { marginTop: "12px" } }, [
        el("span", { class: "label-sm", style: { color: "var(--ocre)" } }, ["Points à revoir"]),
        el("div", { style: { display: "grid", gap: "8px", marginTop: "6px" } }, r.issues.map(function (it) {
          return el("div", { class: "error-chip" }, [
            el("span", { style: { fontWeight: "700" } }, [(issueLabels[it.type] || it.type) + " : "]),
            el("span", {}, [it.detail])
          ]);
        }))
      ]);
    }

    var commentSection = el("section", { style: { marginTop: "12px" } }, [
      el("h3", { style: { margin: "0 0 6px" } }, ["Commentaire pour l'élève"]),
      el("p", { class: "justification", style: { background: "var(--paper-2)", padding: "12px", borderRadius: "10px" } }, [r.overall_comment])
    ]);

    var teacherNote = r.teacher_note ? el("section", { style: { marginTop: "10px" } }, [
      el("span", { class: "label-sm", style: { color: "var(--ink-soft)" } }, ["Note pour l'enseignant·e"]),
      el("p", { style: { fontSize: "0.88rem", color: "var(--ink-soft)", margin: "4px 0 0" } }, [r.teacher_note])
    ]) : null;

    return [
      headerSection, el("div", { class: "divider" }),
      c2Section,
      accurateSection, issuesSection,
      el("div", { class: "divider" }),
      commentSection, teacherNote
    ];
  }

  function renderLevelRow(levels, current, max) {
    return el("div", { style: { display: "flex", flexWrap: "wrap", gap: "6px", marginTop: "8px" } },
      levels.map(function (l) {
        var active = l.code === current;
        return el("div", {
          class: "level-chip" + (active ? " active" : ""),
          style: active ? { background: scoreColor(l.score, max) } : {}
        }, [l.code + " · " + l.score]);
      })
    );
  }

  function renderWhyBox(item) {
    var rows = [];
    if (item.why_not_higher && item.why_not_higher.trim()) {
      rows.push(el("div", { class: "why-row why-up" }, [
        el("span", { class: "why-icon" }, ["↑"]),
        el("span", {}, ["Pour monter d'un niveau : " + item.why_not_higher])
      ]));
    }
    if (item.why_not_lower && item.why_not_lower.trim()) {
      rows.push(el("div", { class: "why-row why-down" }, [
        el("span", { class: "why-icon" }, ["✓"]),
        el("span", {}, ["Ce qui maintient ce niveau : " + item.why_not_lower])
      ]));
    }
    if (rows.length === 0) return null;
    return el("div", { class: "why-box" }, rows);
  }

  function renderTextFormSection(tf) {
    var headerRow = el("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between" } }, [
      el("h3", {}, ["1. Text form"]),
      el("span", { class: "pill", style: { background: scoreColor(tf.score, 5), color: "#FAF6EF" } }, [tf.level + " — " + tf.score + "/5"])
    ]);

    var compMap = [
      ["title", "Meaningful title"],
      ["introduction", "Complete & engaging introduction"],
      ["two_body_paragraphs", "Two well-organized body paragraphs"],
      ["conclusion", "Conclusion with closure"]
    ];
    var checklist = el("ul", { class: "checklist" }, compMap.map(function (pair) {
      var key = pair[0], label = pair[1];
      var present = tf.components_present ? tf.components_present[key] : false;
      var note = tf.component_notes ? tf.component_notes[key] : null;
      return el("li", {}, [
        el("span", { class: "check-box " + (present ? "on" : "off") }, [present ? "✓" : ""]),
        el("div", {}, [
          el("span", { style: { color: present ? "var(--ink)" : "var(--ink-soft)" } }, [label]),
          note ? el("div", { class: "check-note" }, [note]) : null
        ])
      ]);
    }));

    return el("section", {}, [
      headerRow,
      el("p", { class: "justification" }, [tf.justification]),
      checklist,
      renderWhyBox(tf),
      renderLevelRow(LEVELS_TEXT_FORM, tf.level, 5)
    ]);
  }

  function renderAccuracySection(acc) {
    var headerRow = el("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between" } }, [
      el("h3", {}, ["2. Accuracy & clarity"]),
      el("span", { class: "pill", style: { background: scoreColor(acc.score, 15), color: "#FAF6EF" } }, [acc.level + " — " + acc.score + "/15"])
    ]);

    var strengths = (acc.strengths && acc.strengths.length > 0) ? el("div", { style: { marginTop: "10px" } }, [
      el("span", { class: "label-sm", style: { color: "var(--sage)" } }, ["Points forts"]),
      el("ul", { style: { margin: "4px 0 0", paddingLeft: "18px" } }, acc.strengths.map(function (s) {
        return el("li", { style: { fontSize: "0.92rem" } }, [s]);
      }))
    ]) : null;

    var errors = (acc.error_examples && acc.error_examples.length > 0) ? el("div", { style: { marginTop: "12px" } }, [
      el("span", { class: "label-sm", style: { color: "var(--red)" } }, ["Exemples d'erreurs relevées"]),
      el("div", { style: { display: "grid", gap: "8px", marginTop: "6px" } }, acc.error_examples.map(function (e) {
        var impedesText = e.impedes ? (" · affecte " + (e.impedes === "understanding" ? "la compréhension" : "la lisibilité")) : "";
        return el("div", { class: "error-chip" }, [
          el("div", { style: { textDecoration: "line-through", color: "var(--red)", fontFamily: "var(--font-serif)" } }, [e.original]),
          el("div", { style: { fontSize: "0.82rem", color: "var(--ink-soft)", marginTop: "2px" } }, [e.issue + impedesText]),
          el("div", { style: { fontSize: "0.9rem", color: "var(--sage)", marginTop: "2px" } }, ["→ " + e.suggestion])
        ]);
      }))
    ]) : null;

    return el("section", {}, [
      headerRow,
      el("p", { class: "justification" }, [acc.justification]),
      renderWhyBox(acc),
      strengths, errors,
      renderLevelRow(LEVELS_ACCURACY, acc.level, 15)
    ]);
  }

  function renderApiKeyModal() {
    var inputEl = el("input", { type: "password", placeholder: "sk-ant-api03-...", autocomplete: "off", value: state.apiKey });
    inputEl.value = state.apiKey;

    var statusLine = el("div", { style: { marginTop: "10px", minHeight: "20px", fontSize: "0.85rem" } }, []);

    function setStatus(text, kind) {
      clear(statusLine);
      var color = kind === "ok" ? "var(--sage)" : (kind === "err" ? "var(--red)" : "var(--ink-soft)");
      statusLine.appendChild(el("span", { style: { color: color } }, [text]));
    }

    function testKey() {
      var val = inputEl.value.trim();
      if (!val) { setStatus("Entre d'abord une clé.", "err"); return; }
      setStatus("Test en cours…", "info");
      fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": val,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 8, messages: [{ role: "user", content: "ping" }] })
      }).then(function (resp) {
        if (resp.ok) { setStatus("✓ La clé fonctionne ! Tu peux l'enregistrer.", "ok"); return; }
        return resp.text().then(function (body) {
          var detail = "";
          try { var p = JSON.parse(body); if (p && p.error && p.error.message) detail = p.error.message; } catch (e) { detail = body.slice(0, 120); }
          if (resp.status === 401) setStatus("✗ Clé refusée (401). Recopie-la en entier, sans espace.", "err");
          else if (resp.status === 400 && detail.toLowerCase().indexOf("credit") !== -1) setStatus("✗ Pas de crédit. Ajoute du crédit dans Billing.", "err");
          else setStatus("✗ Erreur " + resp.status + " : " + detail, "err");
        });
      }).catch(function (e) {
        var m = (e && e.message) || "";
        if (m.indexOf("Failed to fetch") !== -1 || m.indexOf("Load failed") !== -1) setStatus("✗ Impossible de joindre l'API. Vérifie ta connexion (essaie en données mobiles si wifi restreint).", "err");
        else setStatus("✗ " + m, "err");
      });
    }

    var backdrop = el("div", {
      class: "modal-backdrop",
      onclick: function (e) { if (e.target === backdrop) { state.keyModalOpen = false; render(); } }
    });

    var deleteBtn = state.apiKey ? el("button", {
      class: "btn-ghost", style: { marginTop: "10px" },
      onclick: function () {
        setApiKey("");
        state.apiKey = "";
        state.keyModalOpen = false;
        render();
      }
    }, ["Supprimer la clé enregistrée"]) : null;

    var modal = el("div", { class: "modal" }, [
      el("h2", { style: { marginTop: "0" } }, ["Clé API Anthropic"]),
      el("p", { style: { fontSize: "0.88rem", color: "var(--ink-soft)", lineHeight: "1.5" } }, [
        "Crée une clé sur ",
        el("a", { href: "https://console.anthropic.com", target: "_blank", rel: "noopener noreferrer" }, ["console.anthropic.com"]),
        " → Billing (ajoute un mode de paiement) → API Keys → Create Key. Elle est stockée seulement sur cet appareil — jamais envoyée ailleurs qu'à l'API Anthropic."
      ]),
      el("label", { class: "field-label" }, ["Clé API (commence par sk-ant-...)"]),
      inputEl,
      statusLine,
      el("div", { style: { display: "flex", gap: "10px", marginTop: "12px", flexWrap: "wrap" } }, [
        el("button", { class: "btn-secondary", onclick: testKey }, ["Tester la clé"]),
        el("button", { class: "btn-secondary", onclick: function () { state.keyModalOpen = false; render(); } }, ["Annuler"]),
        el("button", {
          class: "btn-primary", style: { margin: "0", flex: "1", minWidth: "120px" },
          onclick: function () {
            var val = inputEl.value.trim();
            setApiKey(val);
            state.apiKey = val;
            state.keyModalOpen = false;
            state.error = null;
            render();
          }
        }, ["Enregistrer"])
      ]),
      deleteBtn
    ]);

    backdrop.appendChild(modal);
    return backdrop;
  }

  // ==========================================================================
  // PWA install prompt
  // ==========================================================================
  window.addEventListener("beforeinstallprompt", function (e) {
    e.preventDefault();
    state.deferredPrompt = e;
    state.showInstallBanner = true;
    render();
  });

  // ==========================================================================
  // Init
  // ==========================================================================
  render();
})();
</script>
</body>
</html>
